<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="40%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Charcoal tile with subtle violet glow -->
  <rect width="64" height="64" rx="15" fill="#1b1825"/>
  <rect width="64" height="64" rx="15" fill="url(#glow)"/>

  <!-- Gradient spark, tilted for energy -->
  <g transform="rotate(10 32 32)" stroke="url(#g)" stroke-width="7.5" stroke-linecap="round">
    <line x1="32" y1="13.5" x2="32" y2="50.5"/>
    <line x1="15.9" y1="22.7" x2="48.1" y2="41.3"/>
    <line x1="15.9" y1="41.3" x2="48.1" y2="22.7"/>
  </g>

  <!-- Accent dot, bottom-right counterweight -->
  <circle cx="49" cy="50" r="4.5" fill="#22d3ee"/>
</svg>
